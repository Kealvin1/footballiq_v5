name: Snapshot Odds Every 2 Hours

# Replaces the old Netlify scheduled function entirely. Runs on GitHub's
# free infrastructure, fetches opening-line odds for 8 top competitions,
# and commits them straight into the repo as JSON files. The Vercel
# odds.js function then reads these files to calculate line movement —
# no external database needed.

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:   # lets you trigger it manually from the Actions tab to test

permissions:
  contents: write   # needed so this workflow can commit the snapshot files back

jobs:
  snap-odds:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run odds snapshot script
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: node scripts/snap-odds.js

      - name: Commit and push any new snapshot files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/opening-lines/
          if git diff --cached --quiet; then
            echo "No new snapshots to commit."
          else
            git commit -m "Snapshot opening lines $(date -u +%Y-%m-%d_%H-%M)"
            git push
          fi
