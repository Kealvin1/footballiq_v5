name: Snapshot Odds (Smart Frequency)

# Runs every 15 minutes throughout the day.
# The snap-odds.js script itself is smart about what it does:
# - If a fixture is imminent (within 2h): saves a high-resolution
#   movement snapshot so the odds.js function can show sharp-money
#   signals at fine resolution during the actual betting window.
# - Otherwise: saves the opening-line snapshot once per sport per day
#   (same as before) and does nothing else.
# This keeps GitHub Actions minutes well within the free tier while
# capturing meaningful line-movement data only when it matters.

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch:          # manual trigger for testing

permissions:
  contents: write

jobs:
  snap-odds:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run odds snapshot script
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: node scripts/snap-odds.js

      - name: Commit and push any new snapshot files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No new snapshots to commit."
          else
            git commit -m "Snapshot odds $(date -u +%Y-%m-%d_%H-%M)"
            git push
          fi
