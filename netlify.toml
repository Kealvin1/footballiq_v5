[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# snap-odds is now triggered externally every 2h by a free GitHub Actions
# cron workflow (.github/workflows/snap-odds.yml) instead of Netlify's
# billed scheduled-function feature — see that file for the schedule.

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin  = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"

[dev]
  framework = "#static"
  port = 8888
